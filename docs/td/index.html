<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>V3Ko TD</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="logo">V3Ko TD</div>
      <div class="stats">
        <span>❤️ <b id="hp">20</b></span>
        <span>🪙 <b id="gold">100</b></span>
        <span>🌊 <b id="wave">0</b></span>
        <button id="soundBtn" class="ghost">🔊</button>
      </div>
      <button id="startBtn" class="primary">Старт</button>
    </header>

    <div class="layout">
      <canvas id="game"></canvas>
      <aside class="panel">
        <h3>Башни</h3>
        <button class="tower" data-type="basic">Basic · 20🪙</button>
        <button class="tower" data-type="slow">Slow · 30🪙</button>
        <button class="tower" data-type="aoe">AoE · 40🪙</button>
        <hr/>
        <h3>Выбранная</h3>
        <div id="selInfo" class="hint">Нет выбранной башни</div>
        <button id="upgradeBtn" class="tower">Апгрейд · 30🪙</button>
        <button id="sellBtn" class="tower">Продать · +10🪙</button>
        <hr/>
        <div class="hint">Кликни по клетке, чтобы поставить башню. Клик по башне — выбор.</div>
      </aside>
    </div>
  </div>

  <div id="menu" class="menu">
    <div class="menu-card">
      <h1>V3Ko TD</h1>
      <p>Скелет Tower Defense. Выбери уровень и стартовые настройки.</p>

      <div class="group">
        <label>Уровень</label>
        <div class="row">
          <button class="chip active" data-level="easy">Лёгкий</button>
          <button class="chip" data-level="normal">Нормальный</button>
          <button class="chip" data-level="hard">Хард</button>
        </div>
      </div>

      <div class="group">
        <label>Стартовое золото</label>
        <div class="row">
          <button class="chip active" data-gold="100">100</button>
          <button class="chip" data-gold="150">150</button>
          <button class="chip" data-gold="200">200</button>
        </div>
      </div>

      <div class="group">
        <label>Стартовое HP</label>
        <div class="row">
          <button class="chip active" data-hp="20">20</button>
          <button class="chip" data-hp="30">30</button>
          <button class="chip" data-hp="40">40</button>
        </div>
      </div>

      <div class="row">
        <button id="applyBtn" class="primary full">Старт</button>
        <button id="settingsBtn" class="ghost full">Настройки</button>
      </div>
    </div>
  </div>

  <div id="settings" class="menu hidden">
    <div class="menu-card">
      <h2>Настройки</h2>
      <div class="group">
        <label>Скорость игры</label>
        <div class="row">
          <button class="chip active" data-speed="1">1x</button>
          <button class="chip" data-speed="1.5">1.5x</button>
          <button class="chip" data-speed="2">2x</button>
        </div>
      </div>
      <div class="group">
        <label>Плотность волн</label>
        <div class="row">
          <button class="chip active" data-density="1">Обычно</button>
          <button class="chip" data-density="1.3">Густо</button>
          <button class="chip" data-density="1.6">Очень</button>
        </div>
      </div>
      <button id="backBtn" class="ghost full">Назад</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
