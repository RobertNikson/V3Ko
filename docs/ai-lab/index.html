<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Brain Core</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="logo">Brain Core</div>
      <div class="sub">TON · sandbox token</div>
    </header>

    <section class="stats">
      <div class="res"><span>Tokens</span><b id="tokens">0</b></div>
      <div class="res"><span>Brain Lv</span><b id="brainLvl">1</b></div>
      <div class="res"><span>Power</span><b id="power">1</b></div>
    </section>

    <section class="center">
      <div id="brain" class="brain" aria-label="Brain"></div>
      <div class="hint">Тапай по мозгу, чтобы получать токены</div>
    </section>

    <section class="skills">
      <h3>Прокачка скиллов</h3>
      <div class="grid">
        <button class="skill" data-skill="logic">Logic +1<br><small>50 токенов</small></button>
        <button class="skill" data-skill="memory">Memory +1<br><small>60 токенов</small></button>
        <button class="skill" data-skill="vision">Vision +1<br><small>70 токенов</small></button>
        <button class="skill" data-skill="agents">Agents +1<br><small>80 токенов</small></button>
      </div>
    </section>

    <section class="blockchain">
      <h3>Blockchain (TON)</h3>
      <p>Связь с блокчейном и шифрование — режим заглушки до листинга.</p>
      <button id="linkBtn" class="ghost">Подключить TON</button>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
