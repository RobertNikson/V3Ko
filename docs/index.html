<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>V3Ko News</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="logo">V3Ko News</div>
      <div class="actions">
        <button id="refreshBtn" class="ghost">Обновить</button>
      </div>
    </header>

    <section class="hero">
      <h1>Глобальная лента событий</h1>
      <p>Новости, конфликты, экономика, технологии и катастрофы — всё в одном месте.</p>
    </section>

    <nav class="tabs" id="tabs"></nav>

    <main>
      <div id="status" class="status">Загружаю новости…</div>
      <section id="grid" class="grid"></section>
    </main>

    <footer>Источник: GDELT · обновление по запросу</footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
